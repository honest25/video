<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Frame-to-Video Engine</title>
    <style>
        :root {
            --bg-base: #0a0a0c;
            --bg-surface: #16161a;
            --bg-elevated: #202026;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            gap: 2rem;
            grid-template-columns: 1fr;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
        }

        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            background: linear-gradient(to right, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .panel {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        
        input[type="password"], input[type="number"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        .image-upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .upload-box {
            border: 2px dashed var(--border);
            border-radius: 12px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .upload-box:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }
        .upload-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        .upload-box span { z-index: 2; color: var(--text-muted); pointer-events: none; }
        .upload-box input[type="file"] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 3; }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 4px 15px var(--accent-glow); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-container { margin-top: 1.5rem; display: none; }
        .progress-bar { width: 100%; height: 8px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; margin-top: 0.5rem; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s ease; }
        
        .timeline {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-top: 1.5rem;
            padding-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) var(--bg-surface);
        }
        .timeline canvas { height: 60px; border-radius: 4px; border: 1px solid var(--border); }

        .output-panel { display: none; text-align: center; }
        video { width: 100%; max-width: 800px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        
        /* Hidden canvas for high-res processing */
        #renderCanvas { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Cinematic Video Pipeline</h1>
        <p style="color: var(--text-muted);">AI-Directed Transition Engine</p>
    </header>

    <div class="container">
        <div class="panel">
            <div class="input-group">
                <label>Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="AIzaSy..." />
            </div>

            <div class="input-group">
                <label>Frame Count (e.g., 60 for 2 seconds at 30fps)</label>
                <input type="number" id="frameCount" value="60" min="10" max="120" />
            </div>

            <div class="image-upload-grid">
                <div class="upload-box" id="boxStart">
                    <span>+ Upload Start Image</span>
                    <input type="file" id="imgStart" accept="image/jpeg, image/png">
                    <img id="previewStart" src="">
                </div>
                <div class="upload-box" id="boxEnd">
                    <span>+ Upload End Image</span>
                    <input type="file" id="imgEnd" accept="image/jpeg, image/png">
                    <img id="previewEnd" src="">
                </div>
            </div>

            <button id="generateBtn">Initialize Pipeline & Generate</button>

            <div class="status-container" id="statusContainer">
                <div id="statusText" style="color: var(--accent);">Initializing...</div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="timeline" id="timeline"></div>
            </div>
        </div>

        <div class="panel output-panel" id="outputPanel">
            <h2 style="margin-bottom: 1rem;">Final Render</h2>
            <video id="finalVideo" controls loop autoplay></video>
        </div>
    </div>

    <canvas id="renderCanvas" width="1280" height="720"></canvas>

    <script>
        // --- State Management ---
        const state = {
            base64Start: null, base64End: null,
            imgElementA: new Image(), imgElementB: new Image(),
            frames: [], transitionPlan: null
        };

        // --- DOM Elements ---
        const els = {
            apiKey: document.getElementById('apiKey'),
            frameCount: document.getElementById('frameCount'),
            imgStart: document.getElementById('imgStart'),
            imgEnd: document.getElementById('imgEnd'),
            previewStart: document.getElementById('previewStart'),
            previewEnd: document.getElementById('previewEnd'),
            generateBtn: document.getElementById('generateBtn'),
            statusContainer: document.getElementById('statusContainer'),
            statusText: document.getElementById('statusText'),
            progressFill: document.getElementById('progressFill'),
            timeline: document.getElementById('timeline'),
            outputPanel: document.getElementById('outputPanel'),
            finalVideo: document.getElementById('finalVideo'),
            renderCanvas: document.getElementById('renderCanvas')
        };

        const ctx = els.renderCanvas.getContext('2d');

        // --- File Handling ---
        function handleUpload(inputEl, previewEl, stateKey, imgObj) {
            inputEl.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewEl.src = event.target.result;
                    previewEl.style.display = 'block';
                    imgObj.src = event.target.result;
                    // Extract base64 without the data:image prefix for Gemini
                    state[stateKey] = event.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            });
        }
        handleUpload(els.imgStart, els.previewStart, 'base64Start', state.imgElementA);
        handleUpload(els.imgEnd, els.previewEnd, 'base64End', state.imgElementB);

        // --- Step 1 & 2: Gemini API Analysis & Planning ---
        async function generateTransitionPlan(apiKey, frameCount) {
            updateStatus("Step 1/3: Analyzing images with Gemini Vision...", 10);
            
            const promptText = `You are a cinematic transition director. Analyze these two images. 
            Create a highly consistent transition plan spanning exactly ${frameCount} frames.
            Output strictly as a JSON array where each object represents a frame and contains:
            "frame": integer (1 to ${frameCount}),
            "blend": float (0.0 to 1.0, where 0 is image 1, 1 is image 2. Use a smooth ease-in-out curve),
            "scale": float (1.0 to 1.2 for subtle cinematic zoom),
            "panX": integer (pixel offset for motion),
            "panY": integer (pixel offset for motion).
            Do not include markdown blocks, just the raw JSON array.`;

            const payload = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: "image/jpeg", data: state.base64Start } },
                        { inlineData: { mimeType: "image/jpeg", data: state.base64End } }
                    ]
                }],
                generationConfig: { responseMimeType: "application/json" }
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`API Error: ${response.status}`);
                const data = await response.json();
                
                // Parse the JSON strictly
                let rawText = data.candidates[0].content.parts[0].text;
                // Strip markdown backticks if Gemini accidentally includes them despite instructions
                rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                return JSON.parse(rawText);

            } catch (error) {
                console.error(error);
                alert("Failed to generate plan via Gemini. Check API Key or Console.");
                throw error;
            }
        }

        // --- Step 3, 4 & 5: Iterative Frame Generation & Canvas Smoothing ---
        async function renderFramesPipeline(plan) {
            els.timeline.innerHTML = '';
            
            // Set canvas to match first image aspect ratio
            const width = state.imgElementA.width || 1280;
            const height = state.imgElementA.height || 720;
            els.renderCanvas.width = width;
            els.renderCanvas.height = height;

            for (let i = 0; i < plan.length; i++) {
                const step = plan[i];
                updateStatus(`Step 2/3: Generating frame ${i + 1}/${plan.length}...`, 20 + ((i / plan.length) * 60));
                
                ctx.clearRect(0, 0, width, height);

                // Apply cinematic transformations (Zoom/Pan) from Gemini
                ctx.save();
                ctx.translate(width / 2, height / 2);
                const scale = step.scale || 1.0;
                ctx.scale(scale, scale);
                ctx.translate(-width / 2 + (step.panX || 0), -height / 2 + (step.panY || 0));

                // Draw Base Image A
                ctx.globalAlpha = 1.0;
                ctx.drawImage(state.imgElementA, 0, 0, width, height);

                // Draw Blend Image B
                ctx.globalAlpha = step.blend || (i / plan.length);
                ctx.drawImage(state.imgElementB, 0, 0, width, height);
                ctx.restore();

                // Save thumbnail to timeline for UI
                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.width = width / 10; thumbCanvas.height = height / 10;
                thumbCanvas.getContext('2d').drawImage(els.renderCanvas, 0, 0, thumbCanvas.width, thumbCanvas.height);
                els.timeline.appendChild(thumbCanvas);

                // Await a tiny fraction to allow UI to update and mimic async generation
                await new Promise(r => setTimeout(r, 10)); 
            }
        }

        // --- Step 6: Render High-Bitrate Video via MediaRecorder ---
        async function encodeVideo(plan) {
            updateStatus("Step 3/3: Encoding Cinematic Output...", 90);
            
            const stream = els.renderCanvas.captureStream(30); // 30 FPS
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 8000000 });
            const chunks = [];

            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            
            const recordingPromise = new Promise(resolve => {
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    resolve(URL.createObjectURL(blob));
                };
            });

            mediaRecorder.start();

            // Re-play the frames slowly on canvas to feed the MediaRecorder stream properly
            const fpsDelay = 1000 / 30;
            for (let i = 0; i < plan.length; i++) {
                const step = plan[i];
                ctx.save();
                ctx.translate(els.renderCanvas.width/2, els.renderCanvas.height/2);
                ctx.scale(step.scale||1, step.scale||1);
                ctx.translate(-els.renderCanvas.width/2 + (step.panX||0), -els.renderCanvas.height/2 + (step.panY||0));
                
                ctx.globalAlpha = 1.0;
                ctx.drawImage(state.imgElementA, 0, 0, els.renderCanvas.width, els.renderCanvas.height);
                ctx.globalAlpha = step.blend;
                ctx.drawImage(state.imgElementB, 0, 0, els.renderCanvas.width, els.renderCanvas.height);
                ctx.restore();
                
                await new Promise(r => setTimeout(r, fpsDelay));
            }

            mediaRecorder.stop();
            const videoUrl = await recordingPromise;
            
            els.finalVideo.src = videoUrl;
            els.outputPanel.style.display = 'block';
            updateStatus("Complete! Video Ready.", 100);
        }

        // --- Helpers ---
        function updateStatus(text, percent) {
            els.statusText.innerText = text;
            els.progressFill.style.width = `${percent}%`;
        }

        // --- Main Execution Block ---
        els.generateBtn.addEventListener('click', async () => {
            const apiKey = els.apiKey.value.trim();
            const frameCount = parseInt(els.frameCount.value);

            if (!apiKey || !state.base64Start || !state.base64End) {
                alert("Please provide API Key and upload both images.");
                return;
            }

            els.generateBtn.disabled = true;
            els.statusContainer.style.display = 'block';
            els.outputPanel.style.display = 'none';

            try {
                // 1. & 2. Gemini Analysis
                state.transitionPlan = await generateTransitionPlan(apiKey, frameCount);
                
                // 3. 4. & 5. Generate & Smooth
                await renderFramesPipeline(state.transitionPlan);
                
                // 6. Record Stream
                await encodeVideo(state.transitionPlan);

            } catch (err) {
                updateStatus(`Error: ${err.message}`, 0);
                els.progressFill.style.background = 'red';
            } finally {
                els.generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
