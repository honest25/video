<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo UI | Cinematic Frame Interpolator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' },
                        brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' } // Cyan/Blue AI aesthetic
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-focus:focus-within { box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); border-color: rgba(14, 165, 233, 0.5); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans selection:bg-brand-500 selection:text-white pb-12 antialiased">

    <script>
        const API_KEY = "USER_INSERT"; 
    </script>

    <nav class="border-b border-white/10 bg-gray-950/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-gradient-to-br from-brand-400 to-blue-700 flex items-center justify-center font-bold text-white shadow-lg shadow-brand-500/20">V</div>
                <span class="font-bold tracking-tight text-xl">Veo<span class="font-light text-gray-400">Generate</span></span>
            </div>
            <div class="text-xs font-mono text-brand-400 border border-brand-500/30 px-3 py-1.5 rounded-full bg-brand-500/10">Early Access Build</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            
            <div class="glass rounded-2xl p-6 shadow-2xl">
                <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4">Input Keyframes</h2>
                
                <div class="space-y-4">
                    <label class="relative flex flex-col items-center justify-center h-32 border-2 border-dashed border-gray-700 hover:border-brand-500 rounded-xl cursor-pointer bg-gray-900/50 transition-all group overflow-hidden">
                        <input type="file" id="startImage" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'startPreview', 'startText')">
                        <div id="startText" class="text-center group-hover:scale-105 transition-transform duration-300">
                            <svg class="mx-auto h-6 w-6 text-gray-500 mb-2 group-hover:text-brand-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Start Frame</span>
                        </div>
                        <img id="startPreview" class="absolute inset-0 w-full h-full object-cover hidden">
                    </label>

                    <label class="relative flex flex-col items-center justify-center h-32 border-2 border-dashed border-gray-700 hover:border-brand-500 rounded-xl cursor-pointer bg-gray-900/50 transition-all group overflow-hidden">
                        <input type="file" id="endImage" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'endPreview', 'endText')">
                        <div id="endText" class="text-center group-hover:scale-105 transition-transform duration-300">
                            <svg class="mx-auto h-6 w-6 text-gray-500 mb-2 group-hover:text-brand-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">End Frame</span>
                        </div>
                        <img id="endPreview" class="absolute inset-0 w-full h-full object-cover hidden">
                    </label>
                </div>
            </div>

            <div class="glass rounded-2xl p-6 shadow-2xl space-y-5">
                <div class="glow-focus rounded-xl transition-all">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-gray-400">Scene Director</label>
                        <label class="flex items-center cursor-pointer gap-2">
                            <span class="text-[10px] uppercase font-bold text-brand-400">Cinematic</span>
                            <div class="relative">
                                <input type="checkbox" id="cinematicToggle" class="sr-only" checked>
                                <div class="block bg-gray-800 w-8 h-4 rounded-full border border-gray-600 transition-colors peer-checked:bg-brand-500"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-2 h-2 rounded-full transition-transform transform peer-checked:translate-x-4"></div>
                            </div>
                        </label>
                    </div>
                    <textarea id="promptInput" rows="3" class="w-full bg-gray-900/80 border border-gray-700 rounded-xl p-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none transition-all resize-none" placeholder="Describe the motion, physics, and lighting evolution..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-widest">Duration (s)</label>
                        <input type="number" id="durationInput" value="3" min="1" max="10" class="w-full bg-gray-900/80 border border-gray-700 rounded-lg p-2.5 text-sm focus:outline-none focus:border-brand-500 transition-colors text-center font-mono">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-widest">Framerate</label>
                        <select id="fpsInput" class="w-full bg-gray-900/80 border border-gray-700 rounded-lg p-2.5 text-sm focus:outline-none focus:border-brand-500 transition-colors font-mono appearance-none text-center">
                            <option value="12">12 FPS</option>
                            <option value="24" selected>24 FPS</option>
                            <option value="30">30 FPS</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-widest">Resolution</label>
                        <select id="resInput" class="w-full bg-gray-900/80 border border-gray-700 rounded-lg p-2.5 text-sm focus:outline-none focus:border-brand-500 transition-colors font-mono appearance-none text-center">
                            <option value="1280x720">720p (Fast Render)</option>
                            <option value="1920x1080" selected>1080p (High Fidelity)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4 pt-2 border-t border-gray-800">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Color Grade Preset</label>
                        <select id="colorGrade" class="w-full bg-gray-900/80 border border-gray-700 rounded-lg p-2.5 text-sm focus:outline-none focus:border-brand-500 transition-colors appearance-none">
                            <option value="none" selected>Rec.709 (Neutral)</option>
                            <option value="warm">Golden Hour (Warm/High Contrast)</option>
                            <option value="dark">Noir (Desaturated/Moody)</option>
                            <option value="horror">Thriller (Cool/High Saturation)</option>
                        </select>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Camera Dolly/Zoom</label>
                            <span id="motionValue" class="text-[10px] text-brand-400 font-mono">1.15x</span>
                        </div>
                        <input type="range" id="motionIntensity" min="1.0" max="1.5" step="0.05" value="1.15" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-brand-500" oninput="document.getElementById('motionValue').innerText = this.value + 'x'">
                    </div>
                </div>
            </div>

            <button id="generateBtn" onclick="generateVideo()" class="w-full relative group overflow-hidden rounded-xl p-[1px] shadow-lg shadow-brand-500/20 active:scale-[0.98] transition-transform">
                <span class="absolute inset-0 bg-gradient-to-r from-brand-400 via-blue-600 to-brand-400 opacity-80 group-hover:opacity-100 transition-opacity duration-300"></span>
                <div class="relative bg-gray-900 px-6 py-4 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 group-hover:bg-opacity-0">
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span class="font-bold text-white tracking-wide">Generate Sequence</span>
                </div>
            </button>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6">
            
            <div class="glass rounded-2xl flex-grow flex flex-col overflow-hidden shadow-2xl border border-white/5 relative min-h-[450px] bg-black">
                
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-gray-600 z-10 bg-gray-900/40">
                    <svg class="w-16 h-16 mb-4 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                    <p class="font-medium text-sm tracking-wide">Ready to initialize rendering pipeline.</p>
                </div>

                <video id="outputVideo" class="w-full h-full object-contain hidden z-20" controls autoplay loop playsinline></video>

                <div id="loadingOverlay" class="absolute inset-0 bg-gray-950/95 backdrop-blur-md z-30 hidden flex-col items-center justify-center p-8">
                    <div class="relative w-24 h-24 mb-8">
                        <div class="absolute inset-0 border-2 border-gray-800 rounded-full"></div>
                        <div class="absolute inset-0 border-2 border-brand-500 rounded-full border-t-transparent animate-spin"></div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="font-mono text-xs font-bold text-brand-400" id="progressPercent">0%</span>
                        </div>
                    </div>
                    
                    <h3 class="text-xl font-bold text-white mb-2 tracking-tight" id="statusTitle">Connecting to API</h3>
                    <p class="text-sm text-gray-400 text-center max-w-sm font-mono" id="statusDesc">Awaiting response from generativelanguage.googleapis.com</p>
                    
                    <div class="w-full max-w-sm mt-8 bg-gray-800/50 rounded-full h-1 overflow-hidden">
                        <div id="progressBar" class="bg-brand-500 h-full w-0 transition-all duration-300 ease-out shadow-[0_0_10px_rgba(14,165,233,0.8)]"></div>
                    </div>
                </div>

                <canvas id="renderCanvas" class="hidden"></canvas>
            </div>

            <div class="flex justify-between items-center glass rounded-2xl p-4 shadow-xl opacity-50 pointer-events-none transition-opacity duration-300" id="actionPanel">
                <div class="flex items-center gap-3">
                    <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-xs text-gray-400 font-mono tracking-wider" id="renderStats">Awaiting Render</span>
                </div>
                <button id="downloadBtn" class="bg-white text-gray-950 hover:bg-gray-200 px-6 py-2.5 rounded-lg font-bold text-sm transition-colors flex items-center gap-2 shadow-lg shadow-white/10">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                    Download .webm
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- Application State ---
        let startImgData = null;
        let endImgData = null;
        let finalVideoUrl = null;

        const ui = {
            btn: document.getElementById('generateBtn'),
            overlay: document.getElementById('loadingOverlay'),
            title: document.getElementById('statusTitle'),
            desc: document.getElementById('statusDesc'),
            bar: document.getElementById('progressBar'),
            percent: document.getElementById('progressPercent'),
            video: document.getElementById('outputVideo'),
            empty: document.getElementById('emptyState'),
            actionPanel: document.getElementById('actionPanel'),
            downloadBtn: document.getElementById('downloadBtn'),
            stats: document.getElementById('renderStats'),
            canvas: document.getElementById('renderCanvas')
        };

        // --- Image Upload Handler ---
        function handleImageUpload(event, previewId, textId) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const b64 = e.target.result;
                const img = document.getElementById(previewId);
                img.src = b64;
                img.classList.remove('hidden');
                document.getElementById(textId).classList.add('hidden');
                
                if (previewId === 'startPreview') startImgData = b64;
                if (previewId === 'endPreview') endImgData = b64;
            };
            reader.readAsDataURL(file);
        }

        // --- UI State Management ---
        function updateProgress(title, desc, percent) {
            ui.title.innerText = title;
            ui.desc.innerText = desc;
            ui.bar.style.width = `${percent}%`;
            ui.percent.innerText = `${Math.floor(percent)}%`;
        }

        function toggleGenerating(isGenerating) {
            ui.btn.disabled = isGenerating;
            ui.btn.style.opacity = isGenerating ? '0.5' : '1';
            ui.btn.style.cursor = isGenerating ? 'not-allowed' : 'pointer';
            
            if (isGenerating) {
                ui.overlay.classList.remove('hidden');
                ui.overlay.classList.add('flex');
                ui.video.classList.add('hidden');
                ui.empty.classList.add('hidden');
                ui.actionPanel.classList.add('opacity-50', 'pointer-events-none');
            } else {
                ui.overlay.classList.add('hidden');
                ui.overlay.classList.remove('flex');
            }
        }

        // --- Core Generation Flow ---
        async function generateVideo() {
            if (!startImgData || !endImgData) {
                alert("Please upload both a Start and End frame.");
                return;
            }

            // Extract Config
            const config = {
                prompt: document.getElementById('promptInput').value || "Cinematic transition",
                duration: parseInt(document.getElementById('durationInput').value),
                fps: parseInt(document.getElementById('fpsInput').value),
                isCinematic: document.getElementById('cinematicToggle').checked,
                motion: parseFloat(document.getElementById('motionIntensity').value),
                colorGrade: document.getElementById('colorGrade').value
            };
            
            const [w, h] = document.getElementById('resInput').value.split('x').map(Number);
            config.width = w;
            config.height = h;
            
            config.style = config.isCinematic 
                ? "cinematic lighting, ultra-realistic motion, 8k resolution, volumetric fog" 
                : "smooth motion, realistic lighting";

            toggleGenerating(true);
            updateProgress("Initializing VEO Model", "Formatting payload for API...", 5);

            try {
                // 1. Attempt API Call
                const apiSuccess = await attemptVeoApi(config);

                if(!apiSuccess) {
                    throw new Error("API Unauthorized or Endpoint Not Found");
                }
                // If the hypothetical API ever works, handle the response here.

            } catch (error) {
                console.warn("VEO API Route Failed. Triggering Canvas rendering engine.", error);
                
                // 2. Fallback to Local Rendering Engine
                await renderLocalVideo(config);
            }
        }

        // --- Simulated API Call ---
        async function attemptVeoApi(config) {
            updateProgress("Contacting Vertex AI", `POST https://generativelanguage.googleapis.com/v1beta/models/veo-fast:generateVideo`, 15);
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/veo-fast:generateVideo?key=${API_KEY}`;
            const payload = {
                input: { text: `${config.prompt}. Style: ${config.style}`, images: [startImgData, endImgData] },
                videoConfig: { durationSeconds: config.duration, fps: config.fps, resolution: `${config.width}x${config.height}` }
            };

            // Fast timeout to quickly fail over to the local renderer
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000); 

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response.ok; 
            } catch (err) {
                return false; // Expected to fail, triggering fallback
            }
        }

        // --- Local Canvas & MediaRecorder Rendering ---
        async function renderLocalVideo(config) {
            updateProgress("Local Engine Engaged", "API unavailable. Booting local canvas rendering pipeline...", 20);
            
            const canvas = ui.canvas;
            const ctx = canvas.getContext('2d');
            canvas.width = config.width;
            canvas.height = config.height;

            // Configure CSS Filters for Color Grading
            let filter = "none";
            switch(config.colorGrade) {
                case 'warm': filter = "sepia(30%) contrast(115%) saturate(130%) brightness(105%)"; break;
                case 'dark': filter = "contrast(130%) brightness(75%) saturate(70%)"; break;
                case 'horror': filter = "hue-rotate(190deg) contrast(140%) brightness(80%) saturate(60%)"; break;
            }

            // Load Base64 strings into Image Objects
            const loadImg = (src) => new Promise(res => { const img = new Image(); img.onload = () => res(img); img.src = src; });
            const startImg = await loadImg(startImgData);
            const endImg = await loadImg(endImgData);

            updateProgress("Recording Stream", "Initializing MediaRecorder (VP9 Codec)...", 25);

            // Initialize Recorder
            const stream = canvas.captureStream(config.fps);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];
            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

            const totalFrames = config.duration * config.fps;
            const frameMs = 1000 / config.fps;

            // Handle compilation completion
            const recordPromise = new Promise(resolve => {
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    finalVideoUrl = URL.createObjectURL(blob);
                    
                    // Display Output
                    ui.video.src = finalVideoUrl;
                    ui.video.classList.remove('hidden');
                    ui.actionPanel.classList.remove('opacity-50', 'pointer-events-none');
                    ui.downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = finalVideoUrl;
                        a.download = `veo-render-${Date.now()}.webm`;
                        a.click();
                    };
                    ui.stats.innerText = `Render Complete: ${totalFrames} frames @ ${config.width}x${config.height}`;
                    
                    toggleGenerating(false);
                    resolve();
                };
            });

            recorder.start();

            // Frame Rendering Loop
            for (let i = 0; i <= totalFrames; i++) {
                const progress = i / totalFrames; // Normalize 0 to 1
                
                // Calculate simulated Dolly Zoom
                const currentScale = 1.0 + (progress * (config.motion - 1.0));
                
                ctx.clearRect(0, 0, config.width, config.height);
                ctx.save();
                
                // Set Origin to center for scaling
                ctx.translate(config.width/2, config.height/2);
                ctx.scale(currentScale, currentScale);
                ctx.translate(-config.width/2, -config.height/2);

                ctx.filter = filter;

                // Draw Start Image (Fading Out)
                ctx.globalAlpha = 1 - progress;
                drawCover(ctx, startImg, config.width, config.height);

                // Draw End Image (Fading In)
                ctx.globalAlpha = progress;
                drawCover(ctx, endImg, config.width, config.height);

                ctx.restore(); 

                // Update UI (Map loop 0-1 to percentage 25-95)
                const percent = 25 + (progress * 70);
                
                // Optimization: Only update DOM text every few frames to prevent UI thread lock
                if (i % 3 === 0 || i === totalFrames) {
                    updateProgress("Rendering Frames", `Processing frame ${i} of ${totalFrames}`, percent);
                }

                // Yield to main thread & simulate real-time drawing for recorder
                await new Promise(r => setTimeout(r, frameMs));
            }

            updateProgress("Encoding", "Finalizing WebM container...", 98);
            await new Promise(r => setTimeout(r, frameMs * 2)); // Buffer
            recorder.stop();
            await recordPromise;
        }

        // --- Canvas Helper: Object-fit Cover ---
        function drawCover(ctx, img, cw, ch) {
            const imgRatio = img.width / img.height;
            const canvasRatio = cw / ch;
            let dw, dh, dx = 0, dy = 0;

            if (imgRatio > canvasRatio) {
                dh = ch;
                dw = img.width * (ch / img.height);
                dx = (cw - dw) / 2;
            } else {
                dw = cw;
                dh = img.height * (cw / img.width);
                dy = (ch - dh) / 2;
            }
            ctx.drawImage(img, dx, dy, dw, dh);
        }
    </script>
</body>
</html>
